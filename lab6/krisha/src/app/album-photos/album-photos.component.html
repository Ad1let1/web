<div class="gallery-container">
  <div class="gallery-header-section">
    <button (click)="goBack()" class="btn-back-link">⬅ Back to Catalogue</button>
    <div class="title-with-badge">
      <h2>Gallery Explorer</h2>
      <span class="id-badge-neon">Loaded from JSONPlaceholder API</span>
    </div>
  </div>

  @if (!loaded) {
    <div class="loader">Fetching photos from server...</div>
  } @else {
    <div class="neon-photo-grid">
      @for (photo of photos; track photo.id) {
        <div class="neon-photo-card">
          <div class="image-wrapper">
            <img 
              [src]="photo.url" 
              [alt]="photo.title" 
              class="photo-img"
              (error)="handleImageError($event)"
            >
            <div class="photo-overlay">Photo #{{ photo.id }}</div>
          </div>
        </div>
      }
    </div>
  }
</div>
