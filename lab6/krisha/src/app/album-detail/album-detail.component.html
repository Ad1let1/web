<div class="detail-container">
  @if (!loaded) {
    <div class="loader">Скачиваем данные об объекте...</div>
  } @else {
    <div class="detail-card">
      <div class="card-header">
        <h2>Управление объявлением #{{ album.id }}</h2>
      </div>

      <div class="card-body">
        <div class="form-group">
          <label>Заголовок объявления (можно менять):</label>
          <input type="text" [value]="album.title" #newTitle class="title-input">
        </div>

        <div class="action-buttons">
          <button (click)="saveTitle(newTitle.value)" class="btn-save">
            💾 Сохранить изменения
          </button>
          
          <a [routerLink]="['/albums', album.id, 'photos']" class="btn-photos">
            📷 Смотреть фото квартиры
          </a>
        </div>
      </div>

      <div class="card-footer">
        <button (click)="goBack()" class="btn-back">⬅ Вернуться к списку</button>
      </div>
    </div>
  }
</div>
